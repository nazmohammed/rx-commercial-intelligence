# nginx config for the frontend sidecar in the Container App.
#
# - Serves the Vite-built static SPA from /usr/share/nginx/html
# - Reverse-proxies /api/* and /.auth/* to the backend on localhost:8000
# - SPA fallback: any unknown path returns /index.html so the React router
#   (if added later) and direct deep-links keep working.
#
# Easy Auth (Container Apps built-in) sits in front of this nginx and
# injects the X-MS-CLIENT-PRINCIPAL-* headers; we just preserve them.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache for hashed Vite output, short for index.html
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Reverse-proxy API to the backend sidecar on localhost
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve Easy Auth identity headers
        proxy_pass_request_headers on;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # /.auth/* is owned by Easy Auth itself — Container Apps handles it
    # before traffic reaches us. We don't proxy it.

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck for Container Apps probes
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
